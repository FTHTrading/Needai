name: Heartbeat

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate HEARTBEAT_URL
        run: |
          if [ -z "${HEARTBEAT_URL}" ]; then
            echo "Missing HEARTBEAT_URL secret (example: https://your-app.example.com/api/health)"
            exit 2
          fi
        env:
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}

      - name: Ping health endpoint
        run: |
          curl -fsSL -H "user-agent: vanity-heartbeat" "${HEARTBEAT_URL}"
        env:
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}

